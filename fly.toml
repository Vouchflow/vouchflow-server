# Fly.io application configuration for vouchflow-api
# https://fly.io/docs/reference/configuration/
#
# First-time setup:
#   fly apps create vouchflow-api
#   fly secrets set \
#     DATABASE_URL="postgres://..." \
#     REDIS_URL="rediss://..." \
#     INTERNAL_HMAC_SECRET="$(openssl rand -hex 32)" \
#     WEBHOOK_SECRET_ENCRYPTION_KEY="$(openssl rand -hex 32)" \
#     RESEND_API_KEY="re_..." \
#     APPLE_TEAM_ID="..." \
#     APPLE_BUNDLE_ID="..." \
#     GOOGLE_CLOUD_PROJECT_NUMBER="..."
#
# Managed Postgres:  fly postgres create --name vouchflow-db
# Managed Redis:     fly ext upstash redis create

app = "app-damp-field-2104"
primary_region = "iad"

[build]

[deploy]
  # Runs inside the production container before traffic is shifted to new machines.
  # Requires prisma in dependencies (not devDependencies) — see api/package.json.
  release_command = "npx prisma migrate deploy"

[processes]
  app    = "node dist/index.js"
  worker = "node dist/workers/index.js"

[env]
  NODE_ENV    = "production"
  API_VERSION = "2026-04-01"
  API_HOST    = "0.0.0.0"
  PORT        = "8080"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    protocol     = "http"
    timeout      = "5s"
